<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — متجر سوني · MS Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
</head>
<body class="auth-page">

  <!-- Background glow orbs -->
  <div class="auth-bg">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
  </div>

  <div class="auth-container">

    <!-- Logo -->
    <a href="index.html" class="auth-logo">
      <div class="logo-hex"><span class="logo-hex-ms">MS</span></div>
      <div class="auth-logo-text">
        <span>متجر <span class="accent">سوني</span></span>
        <small>MS Store</small>
      </div>
    </a>

    <!-- Card -->
    <div class="auth-card">
      <div class="auth-card-header">
        <h1 class="auth-title">Create your account.</h1>
        <p class="auth-subtitle">Join MS Store to save your wishlist and track orders.</p>
      </div>

      <!-- Error banner -->
      <div class="auth-error" id="authError" style="display:none;">
        <i class="fas fa-exclamation-circle"></i>
        <span id="authErrorMsg">Something went wrong.</span>
      </div>

      <!-- Success banner -->
      <div class="auth-success" id="authSuccess" style="display:none;">
        <i class="fas fa-check-circle"></i>
        <span>Account created! Signing you in…</span>
      </div>

      <!-- Form -->
      <form class="auth-form" id="signupForm" novalidate>

        <div class="auth-field">
          <label class="auth-label" for="fullname">Full name</label>
          <div class="auth-input-wrap">
            <i class="fas fa-user auth-input-icon"></i>
            <input
              type="text"
              id="fullname"
              class="auth-input"
              placeholder="Ahmed Al-Mansouri"
              autocomplete="name"
              required
            />
          </div>
        </div>

        <div class="auth-field">
          <label class="auth-label" for="email">Email address</label>
          <div class="auth-input-wrap">
            <i class="fas fa-envelope auth-input-icon"></i>
            <input
              type="email"
              id="email"
              class="auth-input"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <div class="auth-field">
          <label class="auth-label" for="password">Password</label>
          <div class="auth-input-wrap">
            <i class="fas fa-lock auth-input-icon"></i>
            <input
              type="password"
              id="password"
              class="auth-input"
              placeholder="Min. 8 characters"
              autocomplete="new-password"
              required
              minlength="8"
            />
            <button type="button" class="auth-input-toggle" id="togglePassword" tabindex="-1">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="password-strength" id="passwordStrength">
            <div class="strength-bar">
              <div class="strength-fill" id="strengthFill"></div>
            </div>
            <span class="strength-label" id="strengthLabel"></span>
          </div>
        </div>

        <div class="auth-field">
          <label class="auth-label" for="confirmPassword">Confirm password</label>
          <div class="auth-input-wrap">
            <i class="fas fa-lock auth-input-icon"></i>
            <input
              type="password"
              id="confirmPassword"
              class="auth-input"
              placeholder="Repeat your password"
              autocomplete="new-password"
              required
            />
          </div>
        </div>

        <button type="submit" class="btn btn-primary auth-submit" id="submitBtn">
          Create Account
        </button>

      </form>

      <div class="auth-divider"><span>or</span></div>

      <p class="auth-switch">
        Already have an account? <a href="signin.html" class="auth-link">Sign in</a>
      </p>
    </div>

    <a href="index.html" class="auth-back">
      <i class="fas fa-arrow-left"></i> Back to store
    </a>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let tries = 0;
      const waitForSupa = setInterval(() => {
        tries++;
        if (window.supabase || tries > 20) {
          clearInterval(waitForSupa);
          initSignUp();
        }
      }, 100);
    });

    function initSignUp() {
      const client = window.supabase?.createClient(
        'https://joszupwaztftjlimwfap.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impvc3p1cHdhenRmdGpsaW13ZmFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMjkwOTcsImV4cCI6MjA5MzkwNTA5N30.pFEGxo_hftGKvtLG0uUfQbBGrwbO_ECFSBCvtuzv86I'
      );
      if (!client) return;

      // Redirect if already signed in
      client.auth.getUser().then(({ data: { user } }) => {
        if (user) window.location.href = 'index.html';
      });

      // Password visibility toggle
      document.getElementById('togglePassword').addEventListener('click', () => {
        const input = document.getElementById('password');
        const icon  = document.querySelector('#togglePassword i');
        if (input.type === 'password') {
          input.type = 'text';
          icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
          input.type = 'password';
          icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
      });

      // Password strength meter
      document.getElementById('password').addEventListener('input', (e) => {
        const val = e.target.value;
        const score = getPasswordStrength(val);
        const fill  = document.getElementById('strengthFill');
        const label = document.getElementById('strengthLabel');
        const colors = ['', '#ef4444', '#f97316', '#eab308', '#22c55e'];
        const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
        fill.style.width = `${score * 25}%`;
        fill.style.background = colors[score] || '';
        label.textContent = val.length ? labels[score] : '';
        label.style.color = colors[score] || '';
      });

      // Submit
      document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fullname = document.getElementById('fullname').value.trim();
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirm  = document.getElementById('confirmPassword').value;
        const btn      = document.getElementById('submitBtn');

        hideError();

        if (!fullname) { showError('Please enter your full name.'); return; }
        if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
        if (password !== confirm) { showError('Passwords do not match.'); return; }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account…';

        const { data, error } = await client.auth.signUp({
          email,
          password,
          options: { data: { full_name: fullname } }
        });

        if (error) {
          showError(error.message || 'Sign up failed. Please try again.');
          btn.disabled = false;
          btn.innerHTML = 'Create Account';
          return;
        }

        // Auto sign-in after signup
        const { error: signInError } = await client.auth.signInWithPassword({ email, password });

        if (!signInError) {
          document.getElementById('authSuccess').style.display = 'flex';
          btn.innerHTML = '<i class="fas fa-check"></i> Done!';
          setTimeout(() => { window.location.href = 'index.html'; }, 1200);
        } else {
          // Supabase may require email confirmation
          document.getElementById('authSuccess').style.display = 'flex';
          document.getElementById('authSuccess').querySelector('span').textContent =
            'Check your email to confirm your account, then sign in.';
          btn.innerHTML = 'Create Account';
          btn.disabled = false;
        }
      });
    }

    function getPasswordStrength(pwd) {
      let score = 0;
      if (pwd.length >= 8)  score++;
      if (/[A-Z]/.test(pwd)) score++;
      if (/[0-9]/.test(pwd)) score++;
      if (/[^A-Za-z0-9]/.test(pwd)) score++;
      return score;
    }

    function showError(msg) {
      const el = document.getElementById('authError');
      document.getElementById('authErrorMsg').textContent = msg;
      el.style.display = 'flex';
    }

    function hideError() {
      document.getElementById('authError').style.display = 'none';
    }
  </script>
</body>
</html>
